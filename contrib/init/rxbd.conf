description "RXB Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env RXBD_BIN="/usr/bin/rxbd"
env RXBD_USER="rxb"
env RXBD_GROUP="rxb"
env RXBD_PIDDIR="/var/run/rxbd"
# upstart can't handle variables constructed with other variables
env RXBD_PIDFILE="/var/run/rxbd/rxbd.pid"
env RXBD_CONFIGFILE="/etc/rxb/rxb.conf"
env RXBD_DATADIR="/var/lib/rxbd"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # rxbd will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$RXBD_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run rxbd."
        echo "The setting must appear in $RXBD_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"RXB Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$RXBD_PIDDIR"
    chmod 0755 "$RXBD_PIDDIR"
    chown $RXBD_USER:$RXBD_GROUP "$RXBD_PIDDIR"
    chown $RXBD_USER:$RXBD_GROUP "$RXBD_CONFIGFILE"
    chmod 0660 "$RXBD_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$RXBD_PIDFILE" \
    --chuid $RXBD_USER:$RXBD_GROUP \
    --exec "$RXBD_BIN" \
    -- \
    -pid="$RXBD_PIDFILE" \
    -conf="$RXBD_CONFIGFILE" \
    -datadir="$RXBD_DATADIR" \
    -disablewallet \
    -daemon
