##
## rxb.conf configuration file. Lines beginning with # are comments.
##

##############################################################
##                  Network Configuration                   ##
##############################################################

# Accept incoming connections
listen=1

# Enable RPC server
server=1

# Maximum number of inbound+outbound connections (default: 125)
maxconnections=125

# Use as many addnode= settings as you like to connect to specific peers
#addnode=10.0.0.2:8327

# Connect ONLY to specific peers
#connect=10.0.0.1:8327

# Port on which to listen for connections (default: 8327)
#port=8327

##############################################################
##                    Tor Configuration                     ##
##  RXB supports Tor onion routing for enhanced privacy.    ##
##  Requires Tor service running on your system.            ##
##############################################################

# Route all connections through Tor (recommended for privacy)
#onlynet=onion
#proxy=127.0.0.1:9050
#bind=127.0.0.1:8327

##############################################################
##                    RPC Configuration                     ##
##  Required to control rxbd via rxb-cli or rxb-qt          ##
##############################################################

# Bind RPC to localhost only - do NOT expose to internet
rpcbind=127.0.0.1

# Allow RPC connections from localhost only
rpcallowip=127.0.0.1

# RPC port (default: 8328)
rpcport=8328

# Set your own secure credentials below.
# Generate a strong password with: openssl rand -base64 32
# Do NOT share your password with anyone.
rpcuser=INSERT_YOUR_RPC_USERNAME_HERE
rpcpassword=INSERT_YOUR_OWN_STRONG_PASSWORD_HERE

# Alternatively use rpcauth (more secure, generated via share/rpcauth/rpcauth.py):
# ./share/rpcauth/rpcauth.py yourusername
#rpcauth=yourusername:generated_string_here

# How many seconds rxbd will wait for a complete RPC HTTP request
#rpcclienttimeout=30

# Connect to rxbd running on another host
#rpcconnect=127.0.0.1

##############################################################
##                   Wallet Configuration                   ##
##############################################################

# Enable wallet (set disablewallet=1 to run without wallet)
disablewallet=0

# Specify wallet location (default: ~/.rxb/wallet.dat)
#wallet=/path/to/your/wallet

# Aim to keep transactions confirmed within n blocks (default: 6)
txconfirmtarget=6

# Do not spend unconfirmed change
spendzeroconfchange=0

# Pre-generate key pairs for future wallet backups
#keypool=100

# Pay a transaction fee every time you send RXB
#paytxfee=0.0001

##############################################################
##                   Mining Configuration                   ##
##############################################################

# Enable CPU mining
#gen=1

# Number of CPU threads for mining (-1 = all cores)
#genproclimit=2

# Send mining rewards to this RXB address
#miningaddress=your_RXB_address_here

##############################################################
##               Memory and Performance                     ##
##############################################################

# Maximum mempool size in MB (default: 300)
#maxmempool=300

# Database cache size in MB
# 256 = default, 2000 = recommended for 8GB+ RAM systems
#dbcache=256

# Build full transaction index (required for getrawtransaction on all txs)
#txindex=0

# Enable pruning to reduce storage (incompatible with txindex=1)
# 0 = disabled (default, full node)
# 1 = manual pruning via RPC
# >=550 = target size in MiB
#prune=550

##############################################################
##                      Logging                             ##
##############################################################

# Enable debug logging (options: tor, net, mempool, rpc, wallet, miner)
#debug=tor
#debug=net

##############################################################
##                   User Interface                         ##
##############################################################

# Start rxb-qt minimized
#min=1

# Minimize to the system tray
#minimizetotray=1
